# vCluster values for the vind (vCluster-in-Docker) cluster used by Shoulders.
# Port mappings expose HTTP/HTTPS on the host for Dex, Grafana, and Headlamp.
# Two worker nodes provide additional compute capacity.
controlPlane:
  distro:
    k8s:
      # renovate: datasource=github-tags depName=kubernetes/kubernetes versioning=semver
      version: v1.35.4
privateNodes:
  joinNode:
    nodeRegistration:
      criSocket: unix:///run/containerd/containerd.sock
deploy:
  cni:
    flannel:
      enabled: false
experimental:
  docker:
    ports:
      - "80:80"
      - "443:443"
    nodes:
      - name: worker-1
      - name: worker-2
