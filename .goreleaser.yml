version: 2

project_name: shoulders

before:
  hooks:
    - sh -c "cd shoulders-cli && go generate ./..."
    - sh -c "cd shoulders-cli && go mod tidy"

builds:
  - dir: shoulders-cli
    binary: shoulders
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/jherreros/shoulders/shoulders-cli/cmd.Version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - formats: ['tar.gz']
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    format_overrides:
      - goos: windows
        formats: ['zip']

checksum:
  name_template: 'checksums.txt'

release:
  github:
    owner: jherreros
    name: shoulders

brews:
  - repository:
      owner: jherreros
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_TOKEN }}'
    folder: Formula
    homepage: https://github.com/jherreros/shoulders
    description: CLI for the Shoulders Internal Developer Platform
    license: MIT
    install: |
      bin.install "shoulders"
    test: |
      system "#{bin}/shoulders", "--version"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
