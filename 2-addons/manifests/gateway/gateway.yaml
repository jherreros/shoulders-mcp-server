apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: cilium-gateway
  namespace: kube-system
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: dex-https
      protocol: HTTPS
      port: 443
      hostname: dex.127.0.0.1.sslip.io
      tls:
        certificateRefs:
          - kind: Secret
            name: dex-tls
      allowedRoutes:
        namespaces:
          from: All
