apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-operator
  namespace: trivy-system
spec:
  interval: 5m
  dependsOn:
    - name: kube-prometheus-stack
      namespace: observability
  chart:
    spec:
      chart: trivy-operator
      sourceRef:
        kind: HelmRepository
        name: trivy-operator
        namespace: flux-system
      version: "0.32.1"
  values:
    scanJobTTL: 1h
    cacheReportTTL: 24h
    serviceMonitor:
      enabled: true
    trivy:
      ignoreUnfixed: true
    trivyOperator:
      recordFailedChecksOnly: true
