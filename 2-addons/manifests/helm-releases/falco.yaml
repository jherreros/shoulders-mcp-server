apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: falco
spec:
  interval: 5m
  dependsOn:
    - name: kube-prometheus-stack
      namespace: observability
  chart:
    spec:
      chart: falco
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
      version: "8.0.1"
  values:
    driver:
      kind: modern_ebpf
    tty: true
    falco:
      watch_config_files: false
      json_output: true
      http_output:
        enabled: false
    falcosidekick:
      enabled: true
      config:
        policyreport:
          enabled: true
          maxEvents: 200
    metrics:
      enabled: true
    serviceMonitor:
      create: true
    grafana:
      dashboards:
        enabled: true
