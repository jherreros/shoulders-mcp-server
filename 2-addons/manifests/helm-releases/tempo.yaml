apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: observability
spec:
  interval: 5m
  dependsOn:
    - name: kube-prometheus-stack
      namespace: observability
  chart:
    spec:
      chart: tempo
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    tempo:
      repository: grafana/tempo
      tag: 2.10.3
      storage:
        trace:
          backend: local
          local:
            path: /var/tempo/traces
          wal:
            path: /var/tempo/wal
      metricsGenerator:
        enabled: false
    persistence:
      enabled: false
    securityContext:
      fsGroup: 10001
    serviceMonitor:
      enabled: true
    volumes:
      - name: tempo-data
        emptyDir: {}
    volumeMounts:
      - name: tempo-data
        mountPath: /var/tempo
