apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno-policies
  namespace: kyverno
spec:
  dependsOn:
    - name: kyverno
      namespace: kyverno
  interval: 5m
  chart:
    spec:
      chart: kyverno-policies
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
      version: "3.7.2"
  values:
    validationFailureAction: Audit
    podSecurityStandard: baseline
