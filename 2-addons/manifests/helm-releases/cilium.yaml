apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 5m
  chart:
    spec:
      chart: cilium
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
      version: "1.19.3"
  values:
    image:
      pullPolicy: IfNotPresent
    ipam:
      mode: kubernetes
    gatewayAPI:
      enabled: true
      hostNetwork:
        enabled: true
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
    dashboards:
      enabled: true
      annotations:
        grafana_folder: Cilium
    hubble:
      relay:
        enabled: true
      ui:
        enabled: true
      metrics:
        enableOpenMetrics: true
        enabled:
          - dns
          - drop
          - tcp
          - flow
          - port-distribution
          - icmp
          - "httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction"
        dashboards:
          enabled: true
          annotations:
            grafana_folder: Cilium
    envoy:
      securityContext:
        capabilities:
          envoy:
            - NET_ADMIN
            - SYS_ADMIN
            - NET_BIND_SERVICE
          keepCapNetBindService: true
