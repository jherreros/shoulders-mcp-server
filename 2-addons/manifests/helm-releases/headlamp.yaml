apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  dependsOn:
    - name: dex
      namespace: dex
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: headlamp
            patch: |
              - op: add
                path: /spec/template/spec/hostAliases
                value:
                  - ip: 10.96.0.24
                    hostnames:
                      - dex.127.0.0.1.sslip.io
  interval: 5m
  chart:
    spec:
      chart: headlamp
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
      version: "0.40.0"
  values:
    volumes:
      - name: dex-ca
        configMap:
          name: dex-ca
    volumeMounts:
      - name: dex-ca
        mountPath: /etc/headlamp-oidc
        readOnly: true
    config:
      extraArgs:
        - -oidc-ca-file=/etc/headlamp-oidc/ca.crt
      watchPlugins: true
      oidc:
        clientID: kubernetes
        clientSecret: headlamp-dex-secret
        issuerURL: https://dex.127.0.0.1.sslip.io
        scopes: "openid,email,profile,groups"
        callbackURL: http://headlamp.localhost/oidc-callback
        validatorClientID: kubernetes
        validatorIssuerURL: https://dex.127.0.0.1.sslip.io
        secret:
          create: false
          name: oidc
        useAccessToken: false
        usePKCE: true
    pluginsManager:
      enabled: true
      configContent: |
        plugins:
          - name: shoulders-portal
            source: https://artifacthub.io/packages/headlamp/shoulders-portal-plugin/shoulders-portal
            version: 0.0.6
        installOptions:
          parallel: true
          maxConcurrent: 2
      baseImage: public.ecr.aws/docker/library/node:20-alpine
      version: latest
