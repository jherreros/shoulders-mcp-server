apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
  namespace: cnpg-system
spec:
  interval: 5m
  dependsOn:
    - name: kube-prometheus-stack
      namespace: observability
  chart:
    spec:
      chart: cloudnative-pg
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: flux-system
      version: "0.27.1"
  values:
    monitoring:
      podMonitorEnabled: true
      grafanaDashboard:
        create: true
