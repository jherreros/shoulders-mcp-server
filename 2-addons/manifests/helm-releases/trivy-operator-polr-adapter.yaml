apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-operator-polr-adapter
  namespace: trivy-system
spec:
  dependsOn:
    - name: trivy-operator
      namespace: trivy-system
  interval: 5m
  chart:
    spec:
      chart: trivy-operator-polr-adapter
      sourceRef:
        kind: HelmRepository
        name: trivy-operator-polr-adapter
        namespace: flux-system
      version: "0.11.2"
  values:
    adapters:
      vulnerabilityReports:
        enabled: true
      configAuditReports:
        enabled: true
      rbacAssessmentReports:
        enabled: true
