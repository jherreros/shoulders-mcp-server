apiVersion: v1
kind: ConfigMap
metadata:
  name: trivy-operator-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Trivy Operator"
data:
  trivy-operator-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
          "id": 1,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "auto", "textMode": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "title": "Critical Vulnerabilities",
          "type": "stat",
          "fieldConfig": { "defaults": { "color": { "fixedColor": "dark-red", "mode": "fixed" }, "thresholds": { "mode": "absolute", "steps": [{"color": "dark-red", "value": null}] } }, "overrides": [] },
          "targets": [{ "expr": "sum(trivy_image_vulnerabilities{severity=\"Critical\"}) or vector(0)", "legendFormat": "Critical", "refId": "A" }],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 0 },
          "id": 2,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "auto", "textMode": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "title": "High Vulnerabilities",
          "type": "stat",
          "fieldConfig": { "defaults": { "color": { "fixedColor": "orange", "mode": "fixed" }, "thresholds": { "mode": "absolute", "steps": [{"color": "orange", "value": null}] } }, "overrides": [] },
          "targets": [{ "expr": "sum(trivy_image_vulnerabilities{severity=\"High\"}) or vector(0)", "legendFormat": "High", "refId": "A" }],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 0 },
          "id": 3,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "auto", "textMode": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "title": "Medium Vulnerabilities",
          "type": "stat",
          "fieldConfig": { "defaults": { "color": { "fixedColor": "yellow", "mode": "fixed" }, "thresholds": { "mode": "absolute", "steps": [{"color": "yellow", "value": null}] } }, "overrides": [] },
          "targets": [{ "expr": "sum(trivy_image_vulnerabilities{severity=\"Medium\"}) or vector(0)", "legendFormat": "Medium", "refId": "A" }],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 0 },
          "id": 4,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "auto", "textMode": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "title": "Low Vulnerabilities",
          "type": "stat",
          "fieldConfig": { "defaults": { "color": { "fixedColor": "blue", "mode": "fixed" }, "thresholds": { "mode": "absolute", "steps": [{"color": "blue", "value": null}] } }, "overrides": [] },
          "targets": [{ "expr": "sum(trivy_image_vulnerabilities{severity=\"Low\"}) or vector(0)", "legendFormat": "Low", "refId": "A" }],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 0 },
          "id": 5,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "auto", "textMode": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "title": "Config Audit Findings",
          "type": "stat",
          "fieldConfig": { "defaults": { "color": { "fixedColor": "purple", "mode": "fixed" }, "thresholds": { "mode": "absolute", "steps": [{"color": "purple", "value": null}] } }, "overrides": [] },
          "targets": [{ "expr": "sum(trivy_resource_configaudits) or vector(0)", "legendFormat": "Config Audits", "refId": "A" }],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 0 },
          "id": 6,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "auto", "textMode": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "title": "Exposed Secrets",
          "type": "stat",
          "fieldConfig": { "defaults": { "color": { "fixedColor": "dark-purple", "mode": "fixed" }, "thresholds": { "mode": "absolute", "steps": [{"color": "dark-purple", "value": null}] } }, "overrides": [] },
          "targets": [{ "expr": "sum(trivy_image_exposedsecrets) or vector(0)", "legendFormat": "Secrets", "refId": "A" }],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "id": 10,
          "title": "Vulnerabilities by Severity",
          "type": "piechart",
          "fieldConfig": { "defaults": { "color": { "mode": "fixed" } }, "overrides": [
            { "matcher": { "id": "byName", "options": "Critical" }, "properties": [{ "id": "color", "value": { "fixedColor": "dark-red", "mode": "fixed" } }] },
            { "matcher": { "id": "byName", "options": "High" }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] },
            { "matcher": { "id": "byName", "options": "Medium" }, "properties": [{ "id": "color", "value": { "fixedColor": "yellow", "mode": "fixed" } }] },
            { "matcher": { "id": "byName", "options": "Low" }, "properties": [{ "id": "color", "value": { "fixedColor": "blue", "mode": "fixed" } }] }
          ] },
          "options": { "legend": { "displayMode": "table", "placement": "right", "values": ["value", "percent"] }, "pieType": "donut", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "tooltip": { "mode": "single" } },
          "targets": [{ "expr": "sum by (severity) (trivy_image_vulnerabilities)", "legendFormat": "{{severity}}", "refId": "A" }],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "id": 11,
          "title": "Config Audit Findings by Severity",
          "type": "piechart",
          "fieldConfig": { "defaults": { "color": { "mode": "fixed" } }, "overrides": [
            { "matcher": { "id": "byName", "options": "Critical" }, "properties": [{ "id": "color", "value": { "fixedColor": "dark-red", "mode": "fixed" } }] },
            { "matcher": { "id": "byName", "options": "High" }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] },
            { "matcher": { "id": "byName", "options": "Medium" }, "properties": [{ "id": "color", "value": { "fixedColor": "yellow", "mode": "fixed" } }] },
            { "matcher": { "id": "byName", "options": "Low" }, "properties": [{ "id": "color", "value": { "fixedColor": "blue", "mode": "fixed" } }] }
          ] },
          "options": { "legend": { "displayMode": "table", "placement": "right", "values": ["value", "percent"] }, "pieType": "donut", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "tooltip": { "mode": "single" } },
          "targets": [{ "expr": "sum by (severity) (trivy_resource_configaudits)", "legendFormat": "{{severity}}", "refId": "A" }],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 12 },
          "id": 20,
          "title": "Vulnerabilities by Namespace",
          "type": "barchart",
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" } }, "overrides": [] },
          "options": { "barRadius": 0.1, "barWidth": 0.8, "groupWidth": 0.7, "legend": { "displayMode": "list", "placement": "bottom" }, "orientation": "horizontal", "stacking": "normal", "tooltip": { "mode": "single" }, "xTickLabelRotation": 0 },
          "targets": [
            { "expr": "sum by (namespace, severity) (trivy_image_vulnerabilities{severity=\"Critical\"})", "legendFormat": "{{namespace}} - Critical", "refId": "A" },
            { "expr": "sum by (namespace, severity) (trivy_image_vulnerabilities{severity=\"High\"})", "legendFormat": "{{namespace}} - High", "refId": "B" },
            { "expr": "sum by (namespace, severity) (trivy_image_vulnerabilities{severity=\"Medium\"})", "legendFormat": "{{namespace}} - Medium", "refId": "C" },
            { "expr": "sum by (namespace, severity) (trivy_image_vulnerabilities{severity=\"Low\"})", "legendFormat": "{{namespace}} - Low", "refId": "D" }
          ],
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "transformations": [
            { "id": "joinByLabels", "options": { "join": ["namespace"], "value": "severity" } }
          ]
        },
        {
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 22 },
          "id": 30,
          "title": "Top Vulnerable Images",
          "type": "table",
          "fieldConfig": { "defaults": { "custom": { "align": "auto", "displayMode": "auto" } }, "overrides": [
            { "matcher": { "id": "byName", "options": "Value" }, "properties": [{ "id": "displayName", "value": "Count" }] }
          ] },
          "options": { "showHeader": true, "sortBy": [{ "desc": true, "displayName": "Count" }], "cellHeight": "sm", "footer": { "show": false } },
          "targets": [{ "expr": "topk(20, sum by (image_repository, image_tag, severity) (trivy_image_vulnerabilities{severity=~\"Critical|High\"}))", "legendFormat": "", "refId": "A", "format": "table", "instant": true }],
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "transformations": [
            { "id": "organize", "options": { "excludeByName": { "Time": true, "__name__": true, "job": true, "instance": true }, "renameByName": { "image_repository": "Image", "image_tag": "Tag", "severity": "Severity", "Value": "Count" } } }
          ]
        },
        {
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 32 },
          "id": 40,
          "title": "RBAC Assessment Findings by Severity",
          "type": "piechart",
          "fieldConfig": { "defaults": { "color": { "mode": "fixed" } }, "overrides": [
            { "matcher": { "id": "byName", "options": "Critical" }, "properties": [{ "id": "color", "value": { "fixedColor": "dark-red", "mode": "fixed" } }] },
            { "matcher": { "id": "byName", "options": "High" }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] },
            { "matcher": { "id": "byName", "options": "Medium" }, "properties": [{ "id": "color", "value": { "fixedColor": "yellow", "mode": "fixed" } }] },
            { "matcher": { "id": "byName", "options": "Low" }, "properties": [{ "id": "color", "value": { "fixedColor": "blue", "mode": "fixed" } }] }
          ] },
          "options": { "legend": { "displayMode": "table", "placement": "right", "values": ["value", "percent"] }, "pieType": "donut", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "tooltip": { "mode": "single" } },
          "targets": [{ "expr": "sum by (severity) (trivy_role_rbacassessments)", "legendFormat": "{{severity}}", "refId": "A" }],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 32 },
          "id": 41,
          "title": "Cluster Compliance Status",
          "type": "piechart",
          "fieldConfig": { "defaults": { "color": { "mode": "fixed" } }, "overrides": [
            { "matcher": { "id": "byName", "options": "Pass" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] },
            { "matcher": { "id": "byName", "options": "Fail" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] }
          ] },
          "options": { "legend": { "displayMode": "table", "placement": "right", "values": ["value", "percent"] }, "pieType": "donut", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "tooltip": { "mode": "single" } },
          "targets": [{ "expr": "sum by (status) (trivy_cluster_compliance)", "legendFormat": "{{status}}", "refId": "A" }],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        }
      ],
      "schemaVersion": 39,
      "tags": ["trivy", "security", "vulnerabilities"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "Trivy Operator",
      "uid": "trivy-operator-dashboard",
      "version": 1
    }
